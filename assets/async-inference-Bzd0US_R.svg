<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 610" font-family="monospace, 'Courier New', Courier">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d28d9"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#047857"/>
    </marker>
  </defs>

  <!-- ===== TOP SECTION: Timeline Diagram ===== -->

  <!-- Timeline -->
  <line x1="180" y1="45" x2="920" y2="45" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="890" y="30" fill="#64748b" font-size="16" text-anchor="end">시간 →</text>

  <!-- Row Labels -->
  <text x="30" y="130" fill="#6d28d9" font-size="20" font-weight="bold">VLM (Slow)</text>
  <text x="30" y="270" fill="#c2410c" font-size="20" font-weight="bold">Expert (Fast)</text>

  <!-- VLM Prefill Rectangle -->
  <rect x="190" y="90" width="340" height="75" rx="8" ry="8" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="360" y="134" fill="#374151" font-size="17" text-anchor="middle" font-weight="bold">══ prefill ══</text>

  <!-- Arrow: Prefill → KV Cache -->
  <line x1="532" y1="128" x2="585" y2="128" stroke="#6d28d9" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- KV Cache Rectangle -->
  <rect x="595" y="90" width="170" height="75" rx="8" ry="8" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="680" y="134" fill="#047857" font-size="15" text-anchor="middle" font-weight="bold">KV cache 저장</text>

  <!-- Arrow: KV Cache → Expert (dashed, vertical) -->
  <line x1="680" y1="167" x2="680" y2="228" stroke="#047857" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-green)"/>

  <!-- Denoise Step 1 -->
  <rect x="595" y="232" width="95" height="60" rx="6" ry="6" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="642" y="268" fill="#c2410c" font-size="14" text-anchor="middle">denoise₁</text>

  <!-- Denoise Step 2 -->
  <rect x="710" y="232" width="95" height="60" rx="6" ry="6" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="757" y="268" fill="#c2410c" font-size="14" text-anchor="middle">denoise₂</text>

  <!-- Ellipsis -->
  <text x="835" y="270" fill="#c2410c" font-size="22" text-anchor="middle" font-weight="bold">···</text>

  <!-- Denoise Step N -->
  <rect x="860" y="232" width="95" height="60" rx="6" ry="6" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="907" y="268" fill="#c2410c" font-size="14" text-anchor="middle">denoiseₙ</text>

  <!-- Dotted connectors to evidence boxes -->
  <line x1="360" y1="165" x2="360" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="775" y1="292" x2="775" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== BOTTOM SECTION: Phase Details ===== -->

  <!-- Phase 1: Prefill -->
  <text x="190" y="336" fill="#6d28d9" font-size="15" font-weight="bold">1단계: Prefill</text>

  <rect x="180" y="348" width="365" height="240" rx="8" ry="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- inputs_embeds label -->
  <text x="200" y="375" fill="#94a3b8" font-size="13">inputs_embeds =</text>

  <!-- Visual array: [prefix_embs | None] -->
  <rect x="200" y="388" width="200" height="40" rx="5" ry="5" fill="#ddd6fe" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="300" y="413" fill="#6d28d9" font-size="13" text-anchor="middle" font-weight="bold">prefix_embs</text>

  <rect x="410" y="388" width="115" height="40" rx="5" ry="5" fill="#374151" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="467" y="413" fill="#94a3b8" font-size="13" text-anchor="middle">None</text>

  <!-- Annotations under array slots -->
  <text x="300" y="448" fill="#a78bfa" font-size="12" text-anchor="middle">↑ VLM 실행</text>
  <text x="467" y="448" fill="#64748b" font-size="12" text-anchor="middle">↑ Expert 스킵</text>

  <!-- Separator -->
  <line x1="200" y1="462" x2="525" y2="462" stroke="#374151" stroke-width="1"/>

  <!-- Description -->
  <text x="200" y="485" fill="#a78bfa" font-size="12" font-weight="bold">prefix_embs =</text>
  <text x="200" y="505" fill="#d4d4d8" font-size="12">이미지 + 언어 토큰 임베딩</text>

  <!-- fill_kv_cache -->
  <text x="200" y="540" fill="#22c55e" font-size="14" font-weight="bold">fill_kv_cache = True</text>
  <text x="200" y="560" fill="#94a3b8" font-size="11">→ VLM 결과를 KV cache에 저장</text>

  <!-- Phase 2: Denoising -->
  <text x="590" y="336" fill="#c2410c" font-size="15" font-weight="bold">2단계: Denoising</text>

  <rect x="580" y="348" width="390" height="240" rx="8" ry="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- inputs_embeds label -->
  <text x="600" y="375" fill="#94a3b8" font-size="13">inputs_embeds =</text>

  <!-- Visual array: [None | suffix_embs] -->
  <rect x="600" y="388" width="115" height="40" rx="5" ry="5" fill="#374151" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="657" y="413" fill="#94a3b8" font-size="13" text-anchor="middle">None</text>

  <rect x="725" y="388" width="220" height="40" rx="5" ry="5" fill="#fed7aa" stroke="#c2410c" stroke-width="1.5"/>
  <text x="835" y="413" fill="#c2410c" font-size="13" text-anchor="middle" font-weight="bold">suffix_embs</text>

  <!-- Annotations under array slots -->
  <text x="657" y="448" fill="#64748b" font-size="12" text-anchor="middle">↑ VLM 스킵</text>
  <text x="835" y="448" fill="#fb923c" font-size="12" text-anchor="middle">↑ Expert 실행</text>

  <!-- Separator -->
  <line x1="600" y1="462" x2="950" y2="462" stroke="#374151" stroke-width="1"/>

  <!-- Description -->
  <text x="600" y="485" fill="#fb923c" font-size="12" font-weight="bold">suffix_embs =</text>
  <text x="600" y="505" fill="#d4d4d8" font-size="12">noisy action + timestep 임베딩</text>

  <!-- KV cache reuse -->
  <text x="600" y="540" fill="#22c55e" font-size="14" font-weight="bold">fill_kv_cache = False</text>
  <text x="600" y="560" fill="#94a3b8" font-size="11">→ past_key_values로 KV cache 재사용</text>
</svg>
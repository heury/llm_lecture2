<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">SigLIP pairwise sigmoid loss diagram</title>
  <desc id="desc">A batch of image embeddings and text embeddings forms all image-text pairs. Diagonal pairs are positive and off-diagonal pairs are negative. Each pair is scored independently with sigmoid binary classification.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .label { font: 700 22px Arial, sans-serif; fill: #1f2937; }
      .small { font: 600 18px Arial, sans-serif; fill: #374151; }
      .tiny { font: 600 15px Arial, sans-serif; fill: #4b5563; }
      .muted { font: 500 15px Arial, sans-serif; fill: #64748b; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .embed { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 12; }
      .text-embed { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 12; }
      .pos { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 10; }
      .neg { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .score { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #94a3b8; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">SigLIP: every image-text pair is a binary decision</text>

  <rect x="45" y="95" width="250" height="360" class="panel"/>
  <text x="170" y="135" text-anchor="middle" class="label">Image encoder</text>
  <rect x="82" y="170" width="176" height="54" class="embed"/>
  <text x="170" y="204" text-anchor="middle" class="small">image 1 -> z1</text>
  <rect x="82" y="245" width="176" height="54" class="embed"/>
  <text x="170" y="279" text-anchor="middle" class="small">image 2 -> z2</text>
  <rect x="82" y="320" width="176" height="54" class="embed"/>
  <text x="170" y="354" text-anchor="middle" class="small">image 3 -> z3</text>
  <text x="170" y="420" text-anchor="middle" class="muted">visual representations</text>

  <rect x="905" y="95" width="250" height="360" class="panel"/>
  <text x="1030" y="135" text-anchor="middle" class="label">Text encoder</text>
  <rect x="942" y="170" width="176" height="54" class="text-embed"/>
  <text x="1030" y="204" text-anchor="middle" class="small">text 1 -> t1</text>
  <rect x="942" y="245" width="176" height="54" class="text-embed"/>
  <text x="1030" y="279" text-anchor="middle" class="small">text 2 -> t2</text>
  <rect x="942" y="320" width="176" height="54" class="text-embed"/>
  <text x="1030" y="354" text-anchor="middle" class="small">text 3 -> t3</text>
  <text x="1030" y="420" text-anchor="middle" class="muted">language representations</text>

  <rect x="387" y="100" width="426" height="426" class="panel"/>
  <text x="600" y="140" text-anchor="middle" class="label">All image-text pairs</text>
  <text x="510" y="180" text-anchor="middle" class="tiny">t1</text>
  <text x="600" y="180" text-anchor="middle" class="tiny">t2</text>
  <text x="690" y="180" text-anchor="middle" class="tiny">t3</text>
  <text x="425" y="232" text-anchor="middle" class="tiny">z1</text>
  <text x="425" y="322" text-anchor="middle" class="tiny">z2</text>
  <text x="425" y="412" text-anchor="middle" class="tiny">z3</text>

  <rect x="470" y="200" width="80" height="64" class="pos"/>
  <text x="510" y="225" text-anchor="middle" class="small">+1</text>
  <text x="510" y="247" text-anchor="middle" class="tiny">match</text>
  <rect x="560" y="200" width="80" height="64" class="neg"/>
  <text x="600" y="225" text-anchor="middle" class="small">-1</text>
  <text x="600" y="247" text-anchor="middle" class="tiny">not</text>
  <rect x="650" y="200" width="80" height="64" class="neg"/>
  <text x="690" y="225" text-anchor="middle" class="small">-1</text>
  <text x="690" y="247" text-anchor="middle" class="tiny">not</text>

  <rect x="470" y="290" width="80" height="64" class="neg"/>
  <text x="510" y="315" text-anchor="middle" class="small">-1</text>
  <text x="510" y="337" text-anchor="middle" class="tiny">not</text>
  <rect x="560" y="290" width="80" height="64" class="pos"/>
  <text x="600" y="315" text-anchor="middle" class="small">+1</text>
  <text x="600" y="337" text-anchor="middle" class="tiny">match</text>
  <rect x="650" y="290" width="80" height="64" class="neg"/>
  <text x="690" y="315" text-anchor="middle" class="small">-1</text>
  <text x="690" y="337" text-anchor="middle" class="tiny">not</text>

  <rect x="470" y="380" width="80" height="64" class="neg"/>
  <text x="510" y="405" text-anchor="middle" class="small">-1</text>
  <text x="510" y="427" text-anchor="middle" class="tiny">not</text>
  <rect x="560" y="380" width="80" height="64" class="neg"/>
  <text x="600" y="405" text-anchor="middle" class="small">-1</text>
  <text x="600" y="427" text-anchor="middle" class="tiny">not</text>
  <rect x="650" y="380" width="80" height="64" class="pos"/>
  <text x="690" y="405" text-anchor="middle" class="small">+1</text>
  <text x="690" y="427" text-anchor="middle" class="tiny">match</text>

  <path d="M 295 275 C 330 275, 348 275, 385 275" class="line"/>
  <path d="M 905 275 C 870 275, 850 275, 813 275" class="line"/>

  <rect x="340" y="570" width="520" height="70" class="score"/>
  <text x="600" y="600" text-anchor="middle" class="label">score(z_i, t_j) -> sigmoid -> match / not match</text>
  <text x="600" y="626" text-anchor="middle" class="muted">Positive and negative pairs are optimized independently, without a global softmax.</text>
  <path d="M 600 528 L 600 568" class="line"/>
</svg>
